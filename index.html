<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theatre Booking</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

.screen {
  background:white;
  color:black;
  width:300px;
  margin:20px auto;
  padding:10px;
  border-radius:5px;
}

.container {
  display:grid;
  grid-template-columns:repeat(8,50px);
  gap:8px;
  justify-content:center;
  margin:20px;
}

.seat {
  width:50px;
  height:50px;
  background:#444;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  cursor:pointer;
}

/* DIFFERENT COLORS */
.selected-adult { background:#4da6ff; }   /* blue */
.selected-child { background:#f6c85f; }   /* yellow */

.controls { margin:15px; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.clear { background:red; color:white; }
.checkout { background:green; color:white; }
</style>
</head>

<body>

<h1>Theatre Booking</h1>

<div class="screen">SCREEN</div>

<div class="controls">
  Select Ticket Type:
  <select id="ticketType">
    <option value="child">Child</option>
    <option value="adult">Adult</option>
  </select>
</div>

<div id="seats" class="container"></div>

<p>Seats Selected: <span id="count">0</span></p>
<p>Total Price: $<span id="total">0</span></p>

<div class="controls">
  <button id="clearBtn" class="clear">Deselect All</button>
  <button id="checkoutBtn" class="checkout">Proceed to Checkout</button>
</div>

<script>
const rows = 5;
const cols = 8;

// Base price per row
const basePrices = [10, 12, 15, 18, 20];

// Now stores objects instead of numbers
let selectedSeats = JSON.parse(localStorage.getItem("selectedSeats")) || [];

const container = document.getElementById("seats");
const totalEl = document.getElementById("total");
const countEl = document.getElementById("count");
const ticketTypeEl = document.getElementById("ticketType");

// Label like A1
function getLabel(row, col){
  return String.fromCharCode(65 + row) + (col + 1);
}

// Price per seat
function getPrice(row, type){
  let price = basePrices[row];
  if(type === "adult") price += 5;
  return price;
}

// Draw seats
function drawSeats(){
  container.innerHTML = "";

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){

      const index = r * cols + c;
      const seat = document.createElement("div");

      seat.classList.add("seat");
      seat.innerText = getLabel(r,c);

      // Check if selected
      const found = selectedSeats.find(s => s.index === index);

      if(found){
        seat.classList.add(
          found.type === "adult" ? "selected-adult" : "selected-child"
        );
      }

      seat.addEventListener("click", ()=>{
        const existing = selectedSeats.find(s => s.index === index);

        if(existing){
          // remove
          selectedSeats = selectedSeats.filter(s => s.index !== index);
        } else {
          // add with CURRENT dropdown type
          selectedSeats.push({
            index: index,
            type: ticketTypeEl.value
          });
        }

        save();
        drawSeats();
        updateTotal();
      });

      seat.dataset.row = r;
      container.appendChild(seat);
    }
  }
}

// Update total
function updateTotal(){
  let total = 0;

  selectedSeats.forEach(seat=>{
    const row = Math.floor(seat.index / cols);
    total += getPrice(row, seat.type);
  });

  countEl.innerText = selectedSeats.length;
  totalEl.innerText = total;
}

// Save
function save(){
  localStorage.setItem("selectedSeats", JSON.stringify(selectedSeats));
}

// Clear all
document.getElementById("clearBtn").addEventListener("click", ()=>{
  selectedSeats = [];
  save();
  drawSeats();
  updateTotal();
});

// Checkout
document.getElementById("checkoutBtn").addEventListener("click", ()=>{
  alert("Checkout: " + selectedSeats.length + " seats | Total $" + totalEl.innerText);
});

// Initial load
drawSeats();
updateTotal();
</script>

</body>
</html>
