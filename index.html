<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theatre Booking</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

.screen {
  background:white;
  color:black;
  width:300px;
  margin:20px auto;
  padding:10px;
  border-radius:5px;
  font-weight:bold;
}

.container {
  display:grid;
  grid-template-columns:repeat(8,50px);
  gap:8px;
  justify-content:center;
  margin:20px;
}

.seat {
  width:50px;
  height:50px;
  background:#444;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  cursor:pointer;
}

.selected { background:#6feaf6; }
.occupied { background:#ff4d4d; cursor:not-allowed; }

.controls { margin:15px; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.clear { background:red; color:white; }
.checkout { background:green; color:white; }
</style>
</head>

<body>

<h1>Theatre Booking</h1>

<div class="screen">SCREEN</div>

<div class="controls">
  Ticket Type:
  <select id="ticketType">
    <option value="child">Child</option>
    <option value="adult">Adult</option>
  </select>
</div>

<div id="seats" class="container"></div>

<p>Seats Selected: <span id="count">0</span></p>
<p>Total Price: $<span id="total">0</span></p>

<div class="controls">
  <button id="clearBtn" class="clear">Deselect All</button>
  <button id="checkoutBtn" class="checkout">Proceed to Checkout</button>
</div>

<script>
const rows = 5;
const cols = 8;

const basePrices = [10, 12, 15, 18, 20]; // back → front

let selectedSeats = JSON.parse(localStorage.getItem("selectedSeats")) || [];
let ticketType = localStorage.getItem("ticketType") || "child";

const container = document.getElementById("seats");
const totalEl = document.getElementById("total");
const countEl = document.getElementById("count");
const ticketTypeEl = document.getElementById("ticketType");

ticketTypeEl.value = ticketType;

// Create seat label like A1, B3, etc.
function getLabel(row, col){
  return String.fromCharCode(65 + row) + (col + 1);
}

// Price logic
function getPrice(row){
  let price = basePrices[row];
  if(ticketType === "adult"){
    price += 5; // adult pays more
  }
  return price;
}

function drawSeats(){
  container.innerHTML = "";

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){

      const index = r * cols + c;
      const seat = document.createElement("div");

      seat.classList.add("seat");
      seat.innerText = getLabel(r,c); // ✅ LABELS HERE

      if(selectedSeats.includes(index)){
        seat.classList.add("selected");
      }

      seat.addEventListener("click", ()=>{
        seat.classList.toggle("selected");

        if(selectedSeats.includes(index)){
          selectedSeats = selectedSeats.filter(s => s !== index);
        } else {
          selectedSeats.push(index);
        }

        save();
        updateTotal();
      });

      seat.dataset.row = r;
      container.appendChild(seat);
    }
  }
}

function updateTotal(){
  let total = 0;

  document.querySelectorAll(".seat.selected").forEach(seat=>{
    total += getPrice(parseInt(seat.dataset.row));
  });

  countEl.innerText = selectedSeats.length;
  totalEl.innerText = total;
}

function save(){
  localStorage.setItem("selectedSeats", JSON.stringify(selectedSeats));
  localStorage.setItem("ticketType", ticketType);
}

// CHANGE TICKET TYPE
ticketTypeEl.addEventListener("change", (e)=>{
  ticketType = e.target.value;
  save();
  updateTotal();
});

// ✅ DESELECT BUTTON
document.getElementById("clearBtn").addEventListener("click", ()=>{
  selectedSeats = [];
  save();
  drawSeats();
  updateTotal();
});

// ✅ CHECKOUT BUTTON
document.getElementById("checkoutBtn").addEventListener("click", ()=>{
  alert("Checkout: " + selectedSeats.length + " seats | Total $" + totalEl.innerText);
});

drawSeats();
updateTotal();
</script>

</body>
</html>
