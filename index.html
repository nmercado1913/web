<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theatre Seat Booking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      margin-top: 20px;
    }

    .row {
      display: flex;
      justify-content: center;
    }

    .seat {
      width: 30px;
      height: 30px;
      margin: 5px;
      background-color: #444;
      border-radius: 5px;
      cursor: pointer;
    }

    .seat.selected {
      background-color: #6feaf6;
    }

    .seat.occupied {
      background-color: #fff;
      cursor: not-allowed;
    }

    .seat.vip {
      background-color: gold;
    }

    .seat.vip.selected {
      background-color: orange;
    }

    .screen {
      background-color: #ddd;
      height: 50px;
      width: 60%;
      margin: 20px auto;
      line-height: 50px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Theatre Seat Booking</h1>

<div class="screen">SCREEN</div>

<div class="container" id="seating">
  <!-- Rows will be generated by JS -->
</div>

<p>You selected <span id="count">0</span> seats</p>
<p>Total: $<span id="total">0</span></p>

<script>
  const seating = document.getElementById("seating");
  const count = document.getElementById("count");
  const total = document.getElementById("total");

  const ROWS = 6;
  const COLS = 8;

  const REGULAR_PRICE = 10;
  const VIP_PRICE = 20;

  function createSeats() {
    for (let i = 0; i < ROWS; i++) {
      const row = document.createElement("div");
      row.classList.add("row");

      for (let j = 0; j < COLS; j++) {
        const seat = document.createElement("div");
        seat.classList.add("seat");

        // Make first 2 rows VIP
        if (i < 2) {
          seat.classList.add("vip");
          seat.dataset.price = VIP_PRICE;
        } else {
          seat.dataset.price = REGULAR_PRICE;
        }

        // Randomly mark some seats as occupied
        if (Math.random() < 0.2) {
          seat.classList.add("occupied");
        }

        seat.addEventListener("click", () => {
          if (seat.classList.contains("occupied")) return;

          seat.classList.toggle("selected");
          updateTotal();
        });

        row.appendChild(seat);
      }

      seating.appendChild(row);
    }
  }

  function updateTotal() {
    const selectedSeats = document.querySelectorAll(".seat.selected");
    let totalPrice = 0;

    selectedSeats.forEach(seat => {
      totalPrice += parseInt(seat.dataset.price);
    });

    count.textContent = selectedSeats.length;
    total.textContent = totalPrice;
  }

  createSeats();
</script>

</body>
</html>
