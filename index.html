```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theatre Booking System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    .screen {
      background: #fff;
      height: 50px;
      width: 300px;
      margin: 20px auto;
      border-radius: 5px;
      color: black;
      line-height: 50px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(8, 50px);
      gap: 10px;
      justify-content: center;
      margin: 20px;
    }

    .seat {
      width: 50px;
      height: 50px;
      background: #444;
      border-radius: 5px;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seat.selected {
      background: #6feaf6;
    }

    .seat.occupied {
      background: #ff4d4d;
      cursor: not-allowed;
    }

    .controls {
      margin: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .checkout {
      background: #28a745;
      color: white;
    }

    .clear {
      background: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Theatre Booking</h1>

  <div class="screen">SCREEN</div>

  <div class="controls">
    <label>
      Ticket Type:
      <select id="ticketType">
        <option value="adult">Adult</option>
        <option value="child">Child</option>
      </select>
    </label>
  </div>

  <div class="container" id="seats"></div>

  <div>
    <p>Selected Seats: <span id="count">0</span></p>
    <p>Total Price: $<span id="total">0</span></p>
  </div>

  <div class="controls">
    <button class="clear" id="clearBtn">Deselect All</button>
    <button class="checkout" id="checkoutBtn">Proceed to Checkout</button>
  </div>

  <script>
    const container = document.getElementById("seats");
    const countEl = document.getElementById("count");
    const totalEl = document.getElementById("total");
    const ticketTypeEl = document.getElementById("ticketType");
    const clearBtn = document.getElementById("clearBtn");

    const rows = 5;
    const cols = 8;

    // Base prices by row
    const basePrices = [20, 20, 15, 15, 10];

    // Load saved
    let selectedSeats = JSON.parse(localStorage.getItem("selectedSeats")) || [];
    let occupiedSeats = JSON.parse(localStorage.getItem("occupiedSeats")) || [5, 12];
    let ticketType = localStorage.getItem("ticketType") || "adult";

    ticketTypeEl.value = ticketType;

    function getSeatLabel(row, col) {
      return String.fromCharCode(65 + row) + (col + 1); // A1, B3...
    }

    function getPrice(row) {
      let price = basePrices[row];
      if (ticketType === "adult") price += 5; // adults pay more
      return price;
    }

    function createSeats() {
      container.innerHTML = "";

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const seatIndex = r * cols + c;
          const seat = document.createElement("div");
          seat.classList.add("seat");

          const label = getSeatLabel(r, c);
          seat.innerText = label;

          if (occupiedSeats.includes(seatIndex)) {
            seat.classList.add("occupied");
          }

          if (selectedSeats.includes(seatIndex)) {
            seat.classList.add("selected");
          }

          seat.dataset.index = seatIndex;
          seat.dataset.row = r;

          seat.addEventListener("click", () => {
            if (seat.classList.contains("occupied")) return;

            seat.classList.toggle("selected");

            const index = parseInt(seat.dataset.index);

            if (selectedSeats.includes(index)) {
              selectedSeats = selectedSeats.filter(s => s !== index);
            } else {
              selectedSeats.push(index);
            }

            updateTotal();
            saveData();
          });

          container.appendChild(seat);
        }
      }
    }

    function updateTotal() {
      let total = 0;

      document.querySelectorAll(".seat.selected").forEach(seat => {
        const row = parseInt(seat.dataset.row);
        total += getPrice(row);
      });

      countEl.innerText = selectedSeats.length;
      totalEl.innerText = total;
    }

    function saveData() {
      localStorage.setItem("selectedSeats", JSON.stringify(selectedSeats));
      localStorage.setItem("occupiedSeats", JSON.stringify(occupiedSeats));
      localStorage.setItem("ticketType", ticketType);
    }

    // Ticket type change
    ticketTypeEl.addEventListener("change", (e) => {
      ticketType = e.target.value;
      updateTotal();
      saveData();
    });

    // Clear selection
    clearBtn.addEventListener("click", () => {
      selectedSeats = [];
      saveData();
      createSeats();
      updateTotal();
    });

    // Checkout button
    document.getElementById("checkoutBtn").addEventListener("click", () => {
      alert("Proceeding to checkout with " + selectedSeats.length + " seats.");
    });

    createSeats();
    updateTotal();
  </script>

</body>
</html>
